<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>SkillScan v2 Main Window Layout — frameless window with nav rail, folder list, and skill tile grid</title>

  <rect width="820" height="500" fill="#0a0f1a" rx="0"/>

  <!-- Window shadow -->
  <rect x="20" y="20" width="780" height="460" rx="12" fill="#000" opacity="0.5"/>

  <!-- Window body -->
  <rect x="16" y="16" width="780" height="460" rx="12" fill="#0F172A" stroke="#243846" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="16" y="16" width="780" height="40" rx="12" fill="#1E293B"/>
  <rect x="16" y="36" width="780" height="20" fill="#1E293B"/>
  <rect x="16" y="56" width="780" height="1" fill="#243846"/>

  <!-- Logo -->
  <text x="36" y="41" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">SKILL</text>
  <text x="75" y="41" fill="#0D9488" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">SCAN</text>
  <text x="126" y="41" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="10">Skill Security Environment</text>

  <!-- WM buttons -->
  <rect x="740" y="24" width="26" height="22" rx="4" fill="#243846"/>
  <text x="753" y="38" fill="#94a3b8" font-family="Segoe UI,system-ui,sans-serif" font-size="12" text-anchor="middle">−</text>
  <rect x="770" y="24" width="26" height="22" rx="4" fill="#243846"/>
  <text x="783" y="38" fill="#94a3b8" font-family="Segoe UI,system-ui,sans-serif" font-size="11" text-anchor="middle">✕</text>

  <!-- Nav rail -->
  <rect x="16" y="57" width="56" height="419" fill="#1E293B" rx="0"/>
  <rect x="72" y="57" width="1" height="419" fill="#243846"/>

  <!-- Active indicator -->
  <rect x="16" y="76" width="3" height="36" rx="1.5" fill="#0D9488"/>
  <rect x="19" y="70" width="46" height="48" rx="8" fill="rgba(13,148,136,0.12)"/>

  <!-- Nav items with labels -->
  <!-- Folders (active) -->
  <text x="42" y="91" fill="#0D9488" font-family="Segoe UI Emoji,system-ui,sans-serif" font-size="17" text-anchor="middle">📁</text>
  <text x="42" y="111" fill="#0D9488" font-family="Segoe UI,system-ui,sans-serif" font-size="8" font-weight="600" text-anchor="middle">Folders</text>

  <!-- Inventory -->
  <text x="42" y="139" fill="#475569" font-family="Segoe UI Emoji,system-ui,sans-serif" font-size="17" text-anchor="middle">📋</text>
  <text x="42" y="157" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle">Inventory</text>

  <!-- Create -->
  <text x="42" y="185" fill="#475569" font-family="Segoe UI Emoji,system-ui,sans-serif" font-size="17" text-anchor="middle">✏️</text>
  <text x="42" y="203" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle">Create</text>

  <!-- Testing -->
  <text x="42" y="231" fill="#475569" font-family="Segoe UI Emoji,system-ui,sans-serif" font-size="17" text-anchor="middle">🧪</text>
  <text x="42" y="249" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle">Testing</text>

  <!-- Spacer line -->
  <line x1="26" y1="268" x2="58" y2="268" stroke="#243846" stroke-width="1"/>

  <!-- Options -->
  <text x="42" y="295" fill="#475569" font-family="Segoe UI Emoji,system-ui,sans-serif" font-size="17" text-anchor="middle">⚙️</text>
  <text x="42" y="313" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle">Options</text>

  <!-- About -->
  <text x="42" y="341" fill="#475569" font-family="Segoe UI Emoji,system-ui,sans-serif" font-size="17" text-anchor="middle">ℹ️</text>
  <text x="42" y="359" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle">About</text>

  <!-- Exit (bottom) -->
  <text x="42" y="445" fill="#475569" font-family="Segoe UI Emoji,system-ui,sans-serif" font-size="17" text-anchor="middle">⏻</text>
  <text x="42" y="463" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle">Exit</text>

  <!-- Folders sub-pane -->
  <rect x="73" y="57" width="185" height="419" fill="#111827"/>
  <rect x="258" y="57" width="1" height="419" fill="#243846"/>

  <text x="88" y="80" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="0.8">WATCHED FOLDERS</text>

  <!-- Folder rows -->
  <rect x="73" y="88" width="185" height="36" fill="rgba(13,148,136,0.1)"/>
  <rect x="73" y="88" width="3" height="36" fill="#0D9488"/>
  <text x="88" y="104" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="500">📂 ai-skills</text>
  <rect x="220" y="95" width="28" height="16" rx="8" fill="rgba(234,88,12,0.2)"/>
  <text x="234" y="107" fill="#EA580C" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">3</text>
  <text x="88" y="118" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">8 skills</text>

  <rect x="88" y="132" width="3" height="28" rx="1.5" fill="transparent"/>
  <text x="88" y="150" fill="#64748b" font-family="Segoe UI,system-ui,sans-serif" font-size="11">📂 work-agents</text>
  <rect x="214" y="140" width="28" height="16" rx="8" fill="#1E293B"/>
  <text x="228" y="152" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="middle">12</text>

  <text x="88" y="183" fill="#64748b" font-family="Segoe UI,system-ui,sans-serif" font-size="11">📂 mcp-servers</text>
  <rect x="218" y="173" width="24" height="16" rx="8" fill="#1E293B"/>
  <text x="230" y="185" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="middle">5</text>

  <text x="88" y="216" fill="#64748b" font-family="Segoe UI,system-ui,sans-serif" font-size="11">📂 eval-skills</text>
  <rect x="218" y="206" width="24" height="16" rx="8" fill="#1E293B"/>
  <text x="230" y="218" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="middle">47</text>

  <!-- Add folder button -->
  <rect x="84" y="232" width="162" height="28" rx="5" fill="transparent" stroke="rgba(13,148,136,0.3)" stroke-dasharray="4,3"/>
  <text x="165" y="250" fill="#0D9488" font-family="Segoe UI,system-ui,sans-serif" font-size="11" text-anchor="middle">+ Add Folder…</text>

  <!-- Stats section -->
  <line x1="84" y1="272" x2="246" y2="272" stroke="#243846" stroke-width="1"/>
  <text x="88" y="290" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="0.8">ALL SKILLS</text>
  <text x="88" y="306" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="10">67 tracked · 4 unscanned</text>
  <text x="88" y="322" fill="#E11D48" font-family="Segoe UI,system-ui,sans-serif" font-size="10">● 2 critical</text>
  <text x="150" y="322" fill="#EA580C" font-family="Segoe UI,system-ui,sans-serif" font-size="10">● 1 high</text>
  <text x="88" y="338" fill="#059669" font-family="Segoe UI,system-ui,sans-serif" font-size="10">● 61 clean</text>

  <!-- Main skill tiles pane -->
  <rect x="259" y="57" width="537" height="419" fill="#0F172A"/>

  <!-- Toolbar -->
  <rect x="259" y="57" width="537" height="38" fill="#0F172A"/>
  <rect x="259" y="95" width="537" height="1" fill="#243846"/>
  <text x="275" y="80" fill="#CCFBF1" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="500">📂 ai-skills</text>
  <text x="340" y="80" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="11"> / 8 skills</text>

  <rect x="650" y="64" width="60" height="24" rx="5" fill="#1E293B" stroke="#243846"/>
  <text x="680" y="80" fill="#94a3b8" font-family="Segoe UI,system-ui,sans-serif" font-size="10" text-anchor="middle">Filter ▾</text>
  <rect x="718" y="64" width="68" height="24" rx="5" fill="#0D9488"/>
  <text x="752" y="80" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">⚡ Scan All</text>

  <!-- Tile grid — 4 columns x 2 rows -->
  <!-- Row 1 -->
  <!-- Tile 1: CRITICAL -->
  <rect x="272" y="108" width="118" height="90" rx="8" fill="#1E293B" stroke="#E11D48" stroke-width="1"/>
  <text x="282" y="126" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">data-processor</text>
  <text x="282" y="140" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Reads CSV files from disk</text>
  <text x="282" y="153" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">and formats output</text>
  <rect x="282" y="164" width="64" height="16" rx="4" fill="#2D1217"/>
  <text x="314" y="176" fill="#E11D48" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">CRITICAL</text>
  <text x="372" y="190" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">2h ago</text>

  <!-- Tile 2: CLEAN -->
  <rect x="400" y="108" width="118" height="90" rx="8" fill="#1E293B" stroke="#243846"/>
  <text x="410" y="126" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">web-search</text>
  <text x="410" y="140" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Searches the web and</text>
  <text x="410" y="153" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">returns summarised results</text>
  <rect x="410" y="164" width="46" height="16" rx="4" fill="#022C22"/>
  <text x="433" y="176" fill="#059669" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">CLEAN</text>
  <text x="500" y="190" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">2h ago</text>

  <!-- Tile 3: HIGH -->
  <rect x="528" y="108" width="118" height="90" rx="8" fill="#1E293B" stroke="#EA580C" stroke-width="1"/>
  <text x="538" y="126" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">email-sender</text>
  <text x="538" y="140" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Composes and dispatches</text>
  <text x="538" y="153" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">email via SMTP</text>
  <rect x="538" y="164" width="36" height="16" rx="4" fill="#2D1A10"/>
  <text x="556" y="176" fill="#EA580C" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">HIGH</text>
  <text x="628" y="190" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">1d ago</text>

  <!-- Tile 4: CLEAN -->
  <rect x="656" y="108" width="118" height="90" rx="8" fill="#1E293B" stroke="#243846"/>
  <text x="666" y="126" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">code-runner</text>
  <text x="666" y="140" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Executes Python snippets</text>
  <text x="666" y="153" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">in sandboxed runtime</text>
  <rect x="666" y="164" width="46" height="16" rx="4" fill="#022C22"/>
  <text x="689" y="176" fill="#059669" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">CLEAN</text>
  <text x="756" y="190" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">3d ago</text>

  <!-- Row 2 -->
  <!-- Tile 5: MEDIUM -->
  <rect x="272" y="210" width="118" height="90" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1"/>
  <text x="282" y="228" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">file-manager</text>
  <text x="282" y="242" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Creates, moves, and</text>
  <text x="282" y="255" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">deletes local files</text>
  <rect x="282" y="266" width="54" height="16" rx="4" fill="#2A200E"/>
  <text x="309" y="278" fill="#D97706" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">MEDIUM</text>
  <text x="372" y="292" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">5d ago</text>

  <!-- Tile 6: CLEAN -->
  <rect x="400" y="210" width="118" height="90" rx="8" fill="#1E293B" stroke="#243846"/>
  <text x="410" y="228" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">slack-notify</text>
  <text x="410" y="242" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Posts messages to Slack</text>
  <text x="410" y="255" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">channel via webhook</text>
  <rect x="410" y="266" width="46" height="16" rx="4" fill="#022C22"/>
  <text x="433" y="278" fill="#059669" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">CLEAN</text>
  <text x="500" y="292" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">1w ago</text>

  <!-- Tile 7: UNSCANNED -->
  <rect x="528" y="210" width="118" height="90" rx="8" fill="#1E293B" stroke="#243846" stroke-dasharray="4,3"/>
  <text x="538" y="228" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">db-query</text>
  <text x="538" y="242" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Runs read-only SQL</text>
  <text x="538" y="255" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">queries against Postgres</text>
  <rect x="538" y="266" width="68" height="16" rx="4" fill="#1E293B" stroke="#334155"/>
  <text x="572" y="278" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">UNSCANNED</text>
  <text x="628" y="292" fill="#0D9488" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">new</text>

  <!-- Tile 8: CLEAN with TRUSTED badge -->
  <rect x="656" y="210" width="118" height="90" rx="8" fill="#1E293B" stroke="#243846"/>
  <text x="666" y="228" fill="#F0FDFA" font-family="Segoe UI,system-ui,sans-serif" font-size="11" font-weight="600">calendar-read</text>
  <text x="666" y="242" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Reads Google Calendar</text>
  <text x="666" y="255" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">events via API</text>
  <rect x="666" y="266" width="46" height="16" rx="4" fill="#022C22"/>
  <text x="689" y="278" fill="#059669" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="700" text-anchor="middle">CLEAN</text>
  <rect x="718" y="266" width="46" height="16" rx="4" fill="#0F172A" stroke="#0D9488"/>
  <text x="741" y="278" fill="#0D9488" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-weight="600" text-anchor="middle">✓ TRUST</text>
  <text x="756" y="292" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">2w ago</text>

  <!-- Annotations -->
  <rect x="272" y="318" width="502" height="1" fill="#243846"/>
  <text x="272" y="336" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" font-style="italic">← Tile border colour reflects severity  ·  Dashed border = unscanned  ·  TRUST badge = signed-off after clean scan  ·  Click tile → Skill Detail view</text>

  <!-- Status bar -->
  <rect x="16" y="456" width="780" height="20" fill="#1E293B"/>
  <rect x="16" y="456" width="780" height="1" fill="#243846"/>
  <!-- Rounded bottom corners -->
  <rect x="16" y="456" width="780" height="20" fill="#1E293B" rx="0"/>
  <path d="M16 456 L16 472 Q16 476 20 476 L796 476 Q800 476 800 472 L800 456 Z" fill="#1E293B"/>

  <circle cx="36" cy="466" r="4" fill="#059669"/>
  <text x="46" y="470" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">Scanner ready</text>
  <circle cx="140" cy="466" r="4" fill="#D97706"/>
  <text x="150" y="470" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">4 unscanned</text>
  <circle cx="240" cy="466" r="4" fill="#334155"/>
  <text x="250" y="470" fill="#475569" font-family="Segoe UI,system-ui,sans-serif" font-size="9">claude-sonnet-4-6</text>
  <text x="775" y="470" fill="#334155" font-family="Segoe UI,system-ui,sans-serif" font-size="9" text-anchor="end">v2.0.0</text>

  <!-- Dimension labels -->
  <rect x="16" y="57" width="56" height="15" fill="#0D9488" opacity="0.15" rx="2"/>
  <text x="44" y="68" fill="#0D9488" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle" font-weight="600">NAV 56px</text>

  <rect x="73" y="57" width="185" height="15" fill="#0D9488" opacity="0.08" rx="2"/>
  <text x="165" y="68" fill="#CCFBF1" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle">FOLDER PANE 185px</text>

  <rect x="259" y="57" width="537" height="15" fill="#0D9488" opacity="0.05" rx="2"/>
  <text x="527" y="68" fill="#CCFBF1" font-family="Segoe UI,system-ui,sans-serif" font-size="8" text-anchor="middle">MAIN CONTENT — flex-grow</text>
</svg>
